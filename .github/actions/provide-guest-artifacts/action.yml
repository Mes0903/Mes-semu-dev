name: Provide guest artifacts
description: Provide semu test jobs with guest artifacts from either workflow artifacts or the release cache. Sets PREBUILT_STRICT=1 for later make steps.
inputs:
  use-workflow-artifacts:
    description: Whether test jobs should consume guest artifacts produced by this workflow run.
    required: true
  manifest-sha1:
    description: SHA-1 of the downloaded release manifest for no-drift cache keys.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: validate inputs
      shell: bash
      env:
        USE_WORKFLOW_ARTIFACTS: ${{ inputs.use-workflow-artifacts }}
        MANIFEST_SHA1: ${{ inputs.manifest-sha1 }}
      run: |
        case "$USE_WORKFLOW_ARTIFACTS" in
          true|false) ;;
          *) echo "::error::use-workflow-artifacts must be true or false, got: $USE_WORKFLOW_ARTIFACTS"; exit 1 ;;
        esac
        if [ "$USE_WORKFLOW_ARTIFACTS" = false ]; then
          if [ -z "$MANIFEST_SHA1" ]; then
            echo "::error::manifest-sha1 is required when use-workflow-artifacts is false"
            exit 1
          fi
          if [[ ! "$MANIFEST_SHA1" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::manifest-sha1 must be a 40-character lowercase SHA-1, got: $MANIFEST_SHA1"
            exit 1
          fi
        fi
    - name: set PREBUILT_STRICT=1 for downstream make
      shell: bash
      run: printf 'PREBUILT_STRICT=1\n' >> "$GITHUB_ENV"
    - name: download workflow-built guest artifacts
      if: inputs.use-workflow-artifacts == 'true'
      uses: actions/download-artifact@v7
      with:
        name: guest-artifacts-raw
    - name: use workflow-built artifact directory for make
      if: inputs.use-workflow-artifacts == 'true'
      run: printf 'PREBUILT_URL=file://%s\n' "$PWD" >> "$GITHUB_ENV"
      shell: bash
    - name: cache release-downloaded guest artifacts
      if: inputs.use-workflow-artifacts != 'true'
      uses: actions/cache@v5
      with:
        path: |
          Image
          rootfs.cpio
          test-tools.img
          prebuilt.sha1
          .prebuilt
        key: external-${{ runner.os }}-${{ inputs.manifest-sha1 }}-${{ hashFiles('scripts/prebuilt/artifact-inputs.sh', 'scripts/prebuilt/artifact-recipe-*.env', 'scripts/prebuilt/build-artifacts.sh', 'scripts/prebuilt/build-plan-artifacts.sh', 'scripts/prebuilt/resolve-artifacts.sh', 'scripts/prebuilt/stamp-artifacts.sh', 'scripts/prebuilt/materialize-artifacts.sh', 'scripts/prebuilt/plan-materialize.sh', 'scripts/prebuilt/package.sh', 'scripts/prebuilt/verify-package.sh', 'scripts/rootfs_ext4.sh', 'mk/external.mk') }}
