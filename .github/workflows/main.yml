name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PREBUILT_URL: https://github.com/${{ github.repository }}/releases/download/prebuilt

jobs:
  # Rebuild Image/rootfs.cpio/test-tools.img from source when local
  # guest-artifact inputs have drifted from the prebuilt's recorded inputs.
  # Without this, make check on a change that touches configs, scripts, or
  # target would silently exercise the stale prebuilt instead of the
  # contributor's actual change.
  #
  # The artifacts produced here are published as a workflow artifact
  # (reliable cross-job and cross-runner handoff) and consumed by the
  # test jobs below. On master pushes, a later job publishes the same
  # tested artifacts to the prebuilt GitHub release.
  #
  # The job always runs but short-circuits unless inputs have drifted, so
  # non-drifting runs pay only the cost of a checkout plus drift check.
  guest-artifact-build:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      live_inputs_sha1: ${{ steps.detect.outputs.live_inputs_sha1 }}
      kernel_sha1: ${{ steps.package.outputs.kernel_sha1 }}
      initrd_sha1: ${{ steps.package.outputs.initrd_sha1 }}
      test_tools_sha1: ${{ steps.package.outputs.test_tools_sha1 }}
      inputs_sha1: ${{ steps.package.outputs.inputs_sha1 }}
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: detect input drift
      id: detect
      shell: bash
      run: .ci/detect-prebuilt-drift.sh >> "$GITHUB_OUTPUT"
    - name: cache drift-built raw guest artifacts
      if: steps.detect.outputs.should_build == 'true' && (github.event_name != 'push' || github.ref != 'refs/heads/master')
      id: guest_artifact_cache
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
          test-tools.img
        key: prebuilt-raw-v1-${{ runner.os }}-${{ steps.detect.outputs.live_inputs_sha1 }}
    - name: install build dependencies
      if: steps.detect.outputs.should_build == 'true' && steps.guest_artifact_cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          bc bison flex cpio fakeroot e2fsprogs \
          git python3 libssl-dev libelf-dev wget \
          meson ninja-build pkg-config
      timeout-minutes: 5
    - name: build kernel, rootfs, and test tools disk from source
      if: steps.detect.outputs.should_build == 'true' && steps.guest_artifact_cache.outputs.cache-hit != 'true'
      run: ./scripts/build-image.sh --all --x11 --directfb2-test
      timeout-minutes: 180
    - name: package prebuilt artifacts
      id: package
      if: steps.detect.outputs.should_build == 'true'
      shell: bash
      run: |
        set -euo pipefail
        .ci/package-prebuilt.sh >> "$GITHUB_OUTPUT"
        ls -la Image rootfs.cpio test-tools.img \
          Image.bz2 rootfs.cpio.bz2 test-tools.img.bz2 prebuilt.sha1
    - name: upload guest artifacts
      if: steps.detect.outputs.should_build == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: guest-artifacts
        path: |
          Image
          rootfs.cpio
          test-tools.img
          Image.bz2
          rootfs.cpio.bz2
          test-tools.img.bz2
          prebuilt.sha1
        retention-days: 1
        if-no-files-found: error

  semu-linux:
    needs: guest-artifact-build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dependency:
          - none
          - libpulse-dev
          - libjack-jackd2-dev
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    # Drifted inputs: pull the freshly-built Image/rootfs.cpio/test-tools.img
    # from guest-artifact-build via workflow artifact (reliable, not cache).
    - name: download workflow-built external artifacts
      if: needs.guest-artifact-build.outputs.should_build == 'true'
      uses: actions/download-artifact@v4
      with:
        name: guest-artifacts
    # Non-drift run: cache the release-downloaded artifacts
    # across runs. Include mk/external.mk so checksum or input-pin bumps
    # after a republish invalidate the old external artifacts.
    - name: cache external downloads
      if: needs.guest-artifact-build.outputs.should_build != 'true'
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
          test-tools.img
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'configs/x11.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: install sound multiplexer ${{ matrix.dependency }}
      if: matrix.dependency != 'none'
      run: |
            sudo apt-get install -y ${{ matrix.dependency }}
      timeout-minutes: 5
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 5
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 10
    - name: netdev test
      run: sudo .ci/test-netdev.sh
      shell: bash
      timeout-minutes: 10
    - name: sound test
      run: .ci/test-sound.sh
      shell: bash
      timeout-minutes: 5
    - name: virtio-input test
      run: .ci/test-vinput.sh
      shell: bash
      timeout-minutes: 5
    - name: virtio-gpu test
      run: .ci/test-gpu.sh
      shell: bash
      timeout-minutes: 10

  # Guard the legacy initramfs path so it does not bitrot now that the
  # default boot mode is /dev/vda. Single slim job: fresh build with
  # ENABLE_EXTERNAL_ROOT=0, then run autorun.
  semu-linux-initramfs:
    needs: guest-artifact-build
    runs-on: ubuntu-24.04
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: download workflow-built external artifacts
      if: needs.guest-artifact-build.outputs.should_build == 'true'
      uses: actions/download-artifact@v4
      with:
        name: guest-artifacts
    - name: cache external downloads
      if: needs.guest-artifact-build.outputs.should_build != 'true'
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
          test-tools.img
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'configs/x11.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: legacy initramfs build
      run: make ENABLE_EXTERNAL_ROOT=0
      shell: bash
      timeout-minutes: 5
    - name: legacy initramfs autorun
      run: ENABLE_EXTERNAL_ROOT=0 .ci/autorun.sh
      shell: bash
      timeout-minutes: 10

  semu-macOS:
    needs: guest-artifact-build
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    # macOS cannot run buildroot. On drifted inputs it must consume
    # guest-artifact-build's artifact (built on a linux runner) -- a cache
    # miss here would silently fall back to downloading the stale
    # release, defeating the whole point of the drift-detection logic.
    - name: download workflow-built external artifacts
      if: needs.guest-artifact-build.outputs.should_build == 'true'
      uses: actions/download-artifact@v4
      with:
        name: guest-artifacts
    - name: cache external downloads
      if: needs.guest-artifact-build.outputs.should_build != 'true'
      uses: actions/cache@v4
      with:
        path: |
          Image
          rootfs.cpio
          test-tools.img
        key: external-${{ hashFiles('mk/external.mk', 'configs/linux.config', 'configs/busybox.config', 'configs/buildroot.config', 'configs/x11.config', 'scripts/build-image.sh', 'scripts/rootfs_ext4.sh', 'target/**') }}
    - name: cache submodule builds
      uses: actions/cache@v4
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 20
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 20
    - name: netdev test
      # NOTE: vmnet requires sudo privileges which may not be available in GitHub Actions
      # This test is conditional and will be skipped if sudo is not available
      run: |
            if sudo -n true 2>/dev/null; then
              echo "sudo available, running netdev test"
              sudo .ci/test-netdev.sh
            else
              echo "Skipping netdev test: sudo not available in GitHub Actions runner"
              echo "vmnet.framework requires root privileges or com.apple.vm.networking entitlement"
            fi
      shell: bash
      timeout-minutes: 20
      if: ${{ success() }}
    - name: sound test
      run: .ci/test-sound.sh
      shell: bash
      timeout-minutes: 20
    - name: virtio-input test
      run: .ci/test-vinput.sh
      shell: bash
      timeout-minutes: 20
    - name: virtio-gpu test
      run: .ci/test-gpu.sh
      shell: bash
      timeout-minutes: 20

  coding_style:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-clang-format-20
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: Install clang-format
      run: |
            sudo apt-get update
            sudo apt-get install -q -y clang-format-20
      shell: bash
      timeout-minutes: 5
    - name: Setup reviewdog
      uses: reviewdog/action-setup@v1
      if: github.event_name == 'pull_request'
      with:
        reviewdog_version: latest
      timeout-minutes: 5
    - name: Run clang-format with reviewdog
      if: github.event_name == 'pull_request'
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: .ci/suggest-format.sh
      shell: bash
      timeout-minutes: 5
    - name: Check formatting (fail on violations)
      run: .ci/check-format.sh
      shell: bash
      timeout-minutes: 5
    - name: Check CI shape
      run: .ci/check-ci-shape.sh
      shell: bash
      timeout-minutes: 5

  publish-prebuilt:
    needs:
      - guest-artifact-build
      - semu-linux
      - semu-linux-initramfs
      - semu-macOS
      - coding_style
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.guest-artifact-build.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: download workflow-built external artifacts
      uses: actions/download-artifact@v4
      with:
        name: guest-artifacts
    - name: verify packaged artifacts
      run: .ci/verify-prebuilt-package.sh
    - name: update prebuilt prerelease
      uses: softprops/action-gh-release@v2
      with:
        tag_name: prebuilt
        name: Prebuilt images (rolling)
        prerelease: true
        fail_on_unmatched_files: true
        files: |
          Image.bz2
          rootfs.cpio.bz2
          test-tools.img.bz2
          prebuilt.sha1
        body: |
          Rolling prerelease of the Linux kernel, Buildroot rootfs,
          and optional test tools disk consumed by `mk/external.mk`.
          Re-published from CI whenever any input that defines the
          prebuilt content changes on master.

          All checksums (archive hashes plus the source-input
          fingerprint used for drift detection) are published in the
          `prebuilt.sha1` manifest below; consumers read it directly,
          so no source-tree edit is needed on a republish.

          ## Raw checksums

          ```
          ${{ needs.guest-artifact-build.outputs.kernel_sha1 }}  Image.bz2
          ${{ needs.guest-artifact-build.outputs.initrd_sha1 }}  rootfs.cpio.bz2
          ${{ needs.guest-artifact-build.outputs.test_tools_sha1 }}  test-tools.img.bz2
          ${{ needs.guest-artifact-build.outputs.inputs_sha1 }}  inputs (configs + scripts + target files, concatenated)
          ```
