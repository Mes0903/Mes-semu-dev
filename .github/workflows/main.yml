name: CI

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Do not cancel master push runs because they may be publishing the rolling prebuilt release.
  cancel-in-progress: ${{ github.event_name != 'push' || github.ref != 'refs/heads/master' }}

permissions:
  contents: read

env:
  # Use github.repository so forks and mirrors resolve their own rolling prebuilt release.
  PREBUILT_URL: https://github.com/${{ github.repository }}/releases/download/prebuilt

jobs:
  # Resolve guest artifacts through the provider-neutral prebuilt layer.
  # GitHub cache and workflow artifacts are transport mechanisms only; the
  # resolver decides the plan, and the materializer only executes that plan.
  guest-artifact-build:
    runs-on: ubuntu-24.04
    outputs:
      release_needs_update: ${{ steps.resolve.outputs.release_needs_update }}
      release_manifest_sha1: ${{ steps.resolve.outputs.release_manifest_sha1 }}
    steps:
    - name: checkout code
      uses: actions/checkout@v6
    - name: resolve release update plan
      id: resolve
      shell: bash
      env:
        # Forks and mirrors may not have created their own rolling prebuilt
        # release yet. Only those repos may bootstrap on HTTP 404; the
        # canonical repo should fail fast so maintainers can inspect the
        # external release state manually.
        PREBUILT_BOOTSTRAP_ON_404: ${{ github.repository != 'sysprog21/semu' }}
      run: |
        scripts/prebuilt/resolve-artifacts.sh > "$RUNNER_TEMP/prebuilt-plan.env"
        .ci/github/append-github-output.sh "$RUNNER_TEMP/prebuilt-plan.env" \
          release_needs_update \
          release_manifest_sha1 \
          current_recipe_classes_sha1
    - name: cache workflow-local raw guest artifacts
      if: steps.resolve.outputs.release_needs_update == 'true'
      id: guest_artifact_cache
      uses: actions/cache@v5
      with:
        path: |
          Image
          rootfs.cpio
          test-tools.img
          Image.bz2
          rootfs.cpio.bz2
          test-tools.img.bz2
          prebuilt.sha1
          .prebuilt
        key: prebuilt-raw-${{ steps.resolve.outputs.current_recipe_classes_sha1 }}-${{ hashFiles('scripts/prebuilt/artifact-inputs.sh', 'scripts/prebuilt/artifact-recipe-*.env', 'scripts/prebuilt/build-artifacts.sh', 'scripts/prebuilt/build-plan-artifacts.sh', 'scripts/prebuilt/resolve-artifacts.sh', 'scripts/prebuilt/stamp-artifacts.sh', 'scripts/prebuilt/materialize-artifacts.sh', 'scripts/prebuilt/plan-materialize.sh', 'scripts/prebuilt/package.sh', 'scripts/prebuilt/verify-package.sh', 'scripts/rootfs_ext4.sh', 'mk/external.mk') }}
    - name: strict materialization plan after cache restore
      id: strict_resolve
      if: steps.resolve.outputs.release_needs_update == 'true'
      shell: bash
      env:
        PREBUILT_STRICT: 1
        PREBUILT_LOCAL_FIRST: 1
        # Keep the strict post-cache resolver on the same fork/mirror bootstrap
        # policy as the initial publish-gate resolver.
        PREBUILT_BOOTSTRAP_ON_404: ${{ github.repository != 'sysprog21/semu' }}
      run: |
        scripts/prebuilt/resolve-artifacts.sh > "$RUNNER_TEMP/prebuilt-plan-strict.env"
        .ci/github/append-github-output.sh "$RUNNER_TEMP/prebuilt-plan-strict.env"
    - name: install build dependencies
      if: steps.resolve.outputs.release_needs_update == 'true' && steps.strict_resolve.outputs.requires_build == 'true'
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          bc bison flex cpio fakeroot e2fsprogs \
          git python3 libssl-dev libelf-dev wget \
          meson ninja-build pkg-config
      timeout-minutes: 5
    - name: materialize guest artifacts
      id: materialize
      if: steps.resolve.outputs.release_needs_update == 'true'
      shell: bash
      env:
        PREBUILT_STRICT: 1
        PREBUILT_PLAN_FILE: ${{ runner.temp }}/prebuilt-plan-strict.env
      run: |
        scripts/prebuilt/materialize-artifacts.sh > "$RUNNER_TEMP/prebuilt-materialize.env"
        .ci/github/append-github-output.sh "$RUNNER_TEMP/prebuilt-materialize.env"
      timeout-minutes: 180
    - name: package prebuilt artifacts
      if: steps.resolve.outputs.release_needs_update == 'true'
      shell: bash
      run: scripts/prebuilt/package.sh
    - name: upload raw guest artifacts
      if: steps.resolve.outputs.release_needs_update == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: guest-artifacts-raw
        path: |
          Image
          rootfs.cpio
          test-tools.img
          Image.bz2
          rootfs.cpio.bz2
          test-tools.img.bz2
          prebuilt.sha1
          .prebuilt
        include-hidden-files: true
        retention-days: 1
        if-no-files-found: error
    - name: upload packaged guest artifacts
      if: steps.resolve.outputs.release_needs_update == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: guest-artifacts-packaged
        path: |
          Image.bz2
          rootfs.cpio.bz2
          test-tools.img.bz2
          prebuilt.sha1
        retention-days: 1
        if-no-files-found: error

  semu-linux:
    needs: guest-artifact-build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dependency:
          - none
          - libpulse-dev
          - libjack-jackd2-dev
    steps:
    - name: checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
    # provide-guest-artifacts exports PREBUILT_STRICT=1 through GITHUB_ENV so
    # later make invocations reject stale or unmanaged cached guest artifacts.
    - name: provide guest artifacts
      uses: ./.github/actions/provide-guest-artifacts
      with:
        use-workflow-artifacts: ${{ needs.guest-artifact-build.outputs.release_needs_update }}
        manifest-sha1: ${{ needs.guest-artifact-build.outputs.release_manifest_sha1 }}
    - name: cache submodule builds
      uses: actions/cache@v5
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: install sound multiplexer ${{ matrix.dependency }}
      if: matrix.dependency != 'none'
      run: |
            sudo apt-get install -y ${{ matrix.dependency }}
      timeout-minutes: 5
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 5
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 10
    - name: netdev test
      run: sudo .ci/device-smoke/test-netdev.sh
      shell: bash
      timeout-minutes: 10
    - name: sound test
      run: .ci/device-smoke/test-sound.sh
      shell: bash
      timeout-minutes: 5
    - name: virtio-input test
      run: .ci/device-smoke/test-vinput.sh
      shell: bash
      timeout-minutes: 5
    - name: virtio-gpu test
      run: .ci/device-smoke/test-gpu.sh
      shell: bash
      timeout-minutes: 10

  # Guard the legacy initramfs path so it does not bitrot now that the
  # default boot mode is /dev/vda. Single slim job: fresh build with
  # ENABLE_EXTERNAL_ROOT=0, then run autorun.
  semu-linux-initramfs:
    needs: guest-artifact-build
    runs-on: ubuntu-24.04
    steps:
    - name: checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive
    # provide-guest-artifacts exports PREBUILT_STRICT=1 through GITHUB_ENV so
    # later make invocations reject stale or unmanaged cached guest artifacts.
    - name: provide guest artifacts
      uses: ./.github/actions/provide-guest-artifacts
      with:
        use-workflow-artifacts: ${{ needs.guest-artifact-build.outputs.release_needs_update }}
        manifest-sha1: ${{ needs.guest-artifact-build.outputs.release_manifest_sha1 }}
    - name: cache submodule builds
      uses: actions/cache@v5
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-semu/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: legacy initramfs build
      run: make ENABLE_EXTERNAL_ROOT=0
      shell: bash
      timeout-minutes: 5
    - name: legacy initramfs autorun
      run: ENABLE_EXTERNAL_ROOT=0 .ci/autorun.sh
      shell: bash
      timeout-minutes: 10

  semu-macOS:
    needs: guest-artifact-build
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    # provide-guest-artifacts exports PREBUILT_STRICT=1 through GITHUB_ENV so
    # later make invocations reject stale or unmanaged cached guest artifacts.
    - name: provide guest artifacts
      uses: ./.github/actions/provide-guest-artifacts
      with:
        use-workflow-artifacts: ${{ needs.guest-artifact-build.outputs.release_needs_update }}
        manifest-sha1: ${{ needs.guest-artifact-build.outputs.release_manifest_sha1 }}
    - name: cache submodule builds
      uses: actions/cache@v5
      with:
        path: |
          mini-gdbstub/build
          minislirp/src/*.a
        key: ${{ runner.os }}-submodules-${{ hashFiles('.gitmodules', 'mini-gdbstub/**', 'minislirp/**') }}
        restore-keys: |
          ${{ runner.os }}-submodules-
    - name: install-dependencies
      uses: ./.github/actions/setup-semu
    - name: default build
      run: make
      shell: bash
      timeout-minutes: 20
    - name: automated test
      run: .ci/autorun.sh
      shell: bash
      timeout-minutes: 20
    - name: netdev test
      # NOTE: vmnet requires sudo privileges which may not be available in GitHub Actions
      # This test is conditional and will be skipped if sudo is not available
      run: |
            if sudo -n true 2>/dev/null; then
              echo "sudo available, running netdev test"
              sudo .ci/device-smoke/test-netdev.sh
            else
              echo "Skipping netdev test: sudo not available in GitHub Actions runner"
              echo "vmnet.framework requires root privileges or com.apple.vm.networking entitlement"
            fi
      shell: bash
      timeout-minutes: 20
    - name: sound test
      run: .ci/device-smoke/test-sound.sh
      shell: bash
      timeout-minutes: 20
    - name: virtio-input test
      run: .ci/device-smoke/test-vinput.sh
      shell: bash
      timeout-minutes: 20
    - name: virtio-gpu test
      run: .ci/device-smoke/test-gpu.sh
      shell: bash
      timeout-minutes: 20

  coding_style:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-clang-format-20
        restore-keys: |
          ${{ runner.os }}-apt-
    - name: Install clang-format
      run: |
            sudo apt-get update
            sudo apt-get install -q -y clang-format-20
      shell: bash
      timeout-minutes: 5
    - name: Setup reviewdog
      uses: reviewdog/action-setup@v1
      if: github.event_name == 'pull_request'
      with:
        reviewdog_version: latest
      timeout-minutes: 5
    - name: Run clang-format with reviewdog
      if: github.event_name == 'pull_request'
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: .ci/github/suggest-format.sh
      shell: bash
      timeout-minutes: 5
    - name: Check formatting (fail on violations)
      run: .ci/check-format.sh
      shell: bash
      timeout-minutes: 5

  prebuilt-flow:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Test prebuilt flow
      run: bash .ci/prebuilt/test-flow.sh
      shell: bash
      timeout-minutes: 5
    - name: Test GitHub workflow shape
      run: bash .ci/github/test-workflow-shape.sh
      shell: bash
      timeout-minutes: 5

  publish-prebuilt:
    needs:
      - guest-artifact-build
      - semu-linux
      - semu-linux-initramfs
      - semu-macOS
      - coding_style
      - prebuilt-flow
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.guest-artifact-build.outputs.release_needs_update == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    concurrency:
      group: prebuilt-release
      cancel-in-progress: false
    steps:
    - name: checkout code
      uses: actions/checkout@v6
    - name: download packaged guest artifacts
      uses: actions/download-artifact@v7
      with:
        name: guest-artifacts-packaged
    - name: verify packaged artifacts
      run: scripts/prebuilt/verify-package.sh
    - name: update prebuilt prerelease
      uses: softprops/action-gh-release@v3
      with:
        tag_name: prebuilt
        name: Prebuilt images (rolling)
        prerelease: true
        fail_on_unmatched_files: true
        files: |
          Image.bz2
          rootfs.cpio.bz2
          test-tools.img.bz2
          prebuilt.sha1
        body: |
          Rolling prerelease of the Linux kernel, Buildroot rootfs,
          and optional test tools disk consumed by `mk/external.mk`.
          Re-published from CI whenever any input that defines the
          prebuilt content changes on master.

          Recipe keys for each artifact class are published in the attached
          `prebuilt.sha1` manifest; consumers read it directly, so no
          source-tree edit is needed on a republish.
